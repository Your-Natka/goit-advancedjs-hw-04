<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GoIT Advanced JS HW-03</title>
  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/1.1.0/modern-normalize.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./css/styles.css" />

</head>

<body>
  <main class="page">
    <div class="container">
      <nav class="nav">
        <a class="nav-logo" href="./index.html" aria-label="Site logo">
          <svg class="nav-logo-icon" width="100" height="30">
            <use href="img/sprite.svg#logo"></use>
          </svg>
        </a>
        <form class="form">
          <h1 class="visually-hidden">Image Search</h1>
          <a href="https://pixabay.com/" target="_blank">
            <img class="search-form__logo" src="./img/pixabay-logo.png" alt="logo" width="200" />
          </a>
          <input type="text" name="search-text" placeholder="Search images..." />

          <button type="submit">Search</button>
        </form>
      </nav>
      <div class="loader is-hidden"></div>
      <ul class="gallery"></ul>
    </div>
  </main>
  <script type="module" src="./main.js"></script>
</body>

</html>
